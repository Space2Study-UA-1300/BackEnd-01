components:
  schemas:
    BAD_REQUEST:
      type: object
      properties:
        status:
          type: integer
          example: 400
        code:
          type: string
          example: BAD_REQUEST
        message:
          type: string
          example: The request could not be processed due to invalid or missing parameters
    BAD_REFRESH_TOKEN:
      type: object
      properties:
        status:
          type: integer
          example: 400
        code:
          type: string
          example: BAD_REFRESH_TOKEN
        message:
          type: string
          example: The refresh token is either invalid or has expired
    BAD_RESET_TOKEN:
      type: object
      properties:
        status:
          type: integer
          example: 400
        code:
          type: string
          example: BAD_RESET_TOKEN
        message:
          type: string
          example: The reset token is either invalid or has expired
    EMAIL_NOT_SENT:
      type: object
      properties:
        status:
          type: integer
          example: 400
        code:
          type: string
          example: EMAIL_NOT_SENT
        message:
          type: string
          example: Email has not been sent
    UNAUTHORIZED:
      type: object
      properties:
        status:
          type: integer
          example: 401
        code:
          type: string
          example: UNAUTHORIZED
        message:
          type: string
          example: The requested URL requires user authorization
    USER_NOT_FOUND:
      type: object
      properties:
        status:
          type: integer
          example: 401
        code:
          type: string
          example: USER_NOT_FOUND
        message:
          type: string
          example: User with the specified email was not found
    INCORRECT_CREDENTIALS:
      type: object
      properties:
        status:
          type: integer
          example: 401
        code:
          type: string
          example: INCORRECT_CREDENTIALS
        message:
          type: string
          example: The password you entered is incorrect
    EMAIL_NOT_CONFIRMED:
      type: object
      properties:
        status:
          type: integer
          example: 401
        code:
          type: string
          example: EMAIL_NOT_CONFIRMED
        message:
          type: string
          example: Please confirm your email to login
    FORBIDDEN:
      type: object
      properties:
        status:
          type: integer
          example: 403
        code:
          type: string
          example: FORBIDDEN
        message:
          type: string
          example: You do not have permission to perform this action
    NOT_FOUND:
      type: object
      properties:
        status:
          type: integer
          example: 404
        code:
          type: string
          example: NOT_FOUND
        message:
          type: string
          example: The requested URL was not found
    TEMPLATE_NOT_FOUND:
      type: object
      properties:
        status:
          type: integer
          example: 404
        code:
          type: string
          example: TEMPLATE_NOT_FOUND
        message:
          type: string
          example: The requested template was not found
