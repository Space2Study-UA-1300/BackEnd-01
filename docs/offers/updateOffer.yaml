paths:
  /offers/:id:
    patch:
      tags:
        - Offers
      summary: Update offer by id
      description: Update offer by unique id
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/createOfferRequest'
      parameters:
        - in: path
          name: id
          required: true
          description: Unique identifier of the offer.
          schema:
            type: string
            example: 64b78c33f1e3df00123abcd9
      responses:
        204:
          description: Offer updated successfully. No response returned.
