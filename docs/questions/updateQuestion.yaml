paths:
  /questions/:id:
    patch:
      tags:
        - Questions
      summary: Update question
      description: Update question based on data passed in body
      produces:
        - application/json
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/questionRequest'
      responses:
        201:
          description: Questions response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/questionResponse'
