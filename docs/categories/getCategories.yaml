paths:
  /categories:
    get:
      tags:
        - Categories
      summary: Get categories
      description: Retrieve list of categories based on query params
      produces:
        - application/json
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/categoryName'
        - $ref: '#/components/parameters/skip'
        - $ref: '#/components/parameters/limit'
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/category'
                  count:
                    type: integer
                    example: 1
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UNAUTHORIZED'
