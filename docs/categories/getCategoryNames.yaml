paths:
  /categories/names:
    get:
      tags:
        - Categories
      summary: Get category names
      description: Retrieve list of category names
      produces:
        - application/json
      security:
        - bearerAuth: []
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/categoryNames'
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UNAUTHORIZED'
