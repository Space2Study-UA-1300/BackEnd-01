paths:
  /resources-categories/:id:
    delete:
      tags:
        - Resources&Categories
      summary: Delete resource category
      description: Delete resource category by id
      produces:
        - application/json
      parameters:
        - in: path
          name: id
          required: true
          description: Unique identifier of the category.
          schema:
            type: string
            example: 64b78c33f1e3df00123abcd9
      responses:
        204:
          description: Resource category deleted. No response returned.
