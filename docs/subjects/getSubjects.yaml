paths:
  /subjects:
    get:
      tags:
        - Subjects
      summary: Get subjects
      description: Retrieve list of subjects based on query params
      produces:
        - application/json
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/name'
        - $ref: '#/components/parameters/categoryName'
        - $ref: '#/components/parameters/skip'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/soryBy'
        - $ref: '#/components/parameters/order'
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/subject'
                  totalCount:
                    type: integer
                    example: 1
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UNAUTHORIZED'
