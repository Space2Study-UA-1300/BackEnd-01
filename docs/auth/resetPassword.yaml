paths:
  /auth/reset-password/:token:
    patch:
      tags:
        - Auth
      summary: Update password
      description: Updates user's password.
      produces:
        - application/json
      requestBody:
        required: true
        description: Provide a password to update it.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/resetPassword'
            example:
              password: qwer1234
      responses:
        204:
          description: Password updated successfully. A confirmation email is sent to the user.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 'Password has been updated successfully.'
        400:
          description: Bad Request. Invalid or expired reset token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BAD_RESET_TOKEN'
