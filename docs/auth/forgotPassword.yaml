paths:
  /auth/forgot-password:
    post:
      tags:
        - Auth
      summary: Forgot password
      description: Sends a reset password email to the user with a link to reset the password.
      produces:
        - application/json
      requestBody:
        required: true
        description: Provide an email to reset password.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/forgotPassword'
      responses:
        204:
          description: Email sent successfully.
        404:
          description: Not found. User not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NOT_FOUND'
